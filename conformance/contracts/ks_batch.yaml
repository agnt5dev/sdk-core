version: 1
group: batch
coverage: behavior
cases:
- id: batch.analyze.success
  operation: batch
  component_type: function
  component: ks_analyze_text
  items:
  - text: hello
  - text: one two
  - text: a b c d
  timeout_seconds: 45
  expect:
    status: success
    output_subset:
      stats:
        total_items: 3
        completed_items: 3
        failed_items: 0
      results:
      - status: completed
        output:
          word_count: 1
      - status: completed
        output:
          word_count: 2
      - status: completed
        output:
          word_count: 4
- id: batch.partial_failure
  operation: batch
  component_type: function
  component: ks_fail_with
  items:
  - error_type: none
  - error_type: value
  - error_type: none
  timeout_seconds: 45
  expect:
    status: failure
    output_subset:
      stats:
        total_items: 3
        completed_items: 2
        failed_items: 1
      results:
      - status: completed
        output:
          status: no_error
      - status: failed
      - status: completed
        output:
          status: no_error
- id: batch.enveloped_items
  operation: batch
  component_type: function
  component: ks_analyze_text
  items:
  - input:
      text: envelope one
    index: 10
    item_id: item-ten
    metadata:
      source: conformance
  - input:
      text: envelope has three
    index: 20
    item_id: item-twenty
  timeout_seconds: 45
  expect:
    status: success
    output_subset:
      stats:
        total_items: 2
        completed_items: 2
        failed_items: 0
      results:
      - status: completed
        output:
          word_count: 2
      - status: completed
        output:
          word_count: 3
- id: batch.status.completed
  operation: batch_status
  component_type: function
  component: ks_analyze_text
  items:
  - text: status one
  - text: status has three
  timeout_seconds: 45
  expect:
    status: success
    output_subset:
      found: true
      stats:
        total_items: 2
        completed_items: 2
        failed_items: 0
        cancelled_items: 0
        pending_items: 0
      results:
      - index: 0
        status: completed
        output:
          word_count: 2
      - index: 1
        status: completed
        output:
          word_count: 3
- id: batch.status.not_found
  operation: batch_status
  component_type: function
  component: ks_noop
  batch_id: conformance-missing-batch
  timeout_seconds: 10
  expect:
    status: failure
    error_contains: batch not found
    output_subset:
      found: false
- id: batch.cancel.running_items
  operation: batch_cancel
  component_type: function
  component: ks_sleep
  items:
  - duration_ms: 60000
  - duration_ms: 60000
  - duration_ms: 60000
  cancel_after_seconds: 0.25
  cancel_reason: conformance
  timeout_seconds: 45
  expect:
    status: failure
    output_subset:
      status: cancelled
      stats:
        total_items: 3
        completed_items: 0
        failed_items: 0
        cancelled_items: 3
        pending_items: 0

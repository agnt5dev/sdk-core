[package]
name = "agnt5-sdk-core"
version = "0.1.0"
edition = "2021"
authors = ["AGNT5 Team"]
description = "High-performance Rust core for AGNT5 SDK"

[lib]
name = "agnt5_sdk_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
# gRPC and Protocol Buffers
tonic = "0.14.1"
tonic-prost = "0.14.1"
prost = "0.14.1"
prost-types = "0.14.1"

# Async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"
async-stream = "0.3"
async-trait = "0.1"
flume = "0.11"

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }
tracing-log = "0.2"
log = "0.4"

# OpenTelemetry - with OTLP exporter for traces and logs
opentelemetry = "0.30"
opentelemetry_sdk = { version = "0.30", features = ["rt-tokio", "logs"] }
opentelemetry-otlp = { version = "0.30", features = ["trace", "logs", "grpc-tonic"] }
opentelemetry-appender-tracing = "0.30"
tracing-opentelemetry = "0.31"

# UUID generation
uuid = { version = "1.0", features = ["v4"] }

# Random number generation for jitter
rand = "0.9"

# Additional logging and time dependencies
lazy_static = "1.4"
chrono = { version = "0.4", features = ["serde"] }

# Build dependencies
[build-dependencies]
tonic-prost-build = "0.14"

# Examples
[[example]]
name = "debug_worker"
path = "examples/debug_worker.rs"
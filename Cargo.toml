[package]
name = "agnt5-sdk-core"
version = "0.1.0"
edition = "2021"
authors = ["AGNT5 Team"]
description = "High-performance Rust core for AGNT5 SDK"

[lib]
name = "agnt5_sdk_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
# gRPC and Protocol Buffers
tonic = "0.12"
prost = "0.13"
prost-types = "0.13"

# Async runtime
tokio = { version = "1.0", features = ["full"] }
tokio-stream = "0.1"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# UUID generation
uuid = { version = "1.0", features = ["v4"] }

# Build dependencies
[build-dependencies]
tonic-build = "0.12"
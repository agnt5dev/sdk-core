}

message CancelTimerRequest {
  string run_id = 1;
  string timer_key = 2;
  string waiting_step = 3;
  string dedupe_id = 4;
}

message CancelTimerResponse {
  string event_id = 1;
}

message ListPendingWaitsRequest {
  string run_id = 1;
}

message ListPendingWaitsResponse {
  repeated PendingSignal signals = 1;
  repeated PendingTimer timers = 2;
}

message PendingSignal {
  string signal_name = 1;
  string waiting_step = 2;
  google.protobuf.Timestamp received_at = 3;
}

message PendingTimer {
  string timer_key = 1;
  string waiting_step = 2;
  google.protobuf.Timestamp fire_at = 3;

}

// Health check response sent by coordinator to worker
message HealthResponse {
  int64 timestamp = 1;           // Coordinator's timestamp
  bool ack = 2;                  // Acknowledgment of health check
  string message = 3;            // Optional response message
}

// Graceful unregistration message
message UnregisterService {
  string reason = 1;             // Reason for unregistration (shutdown, error, etc.)
  int64 timestamp = 2;           // When unregistration was initiated
}

// Worker health status enum
enum WorkerHealthStatus {
  WORKER_HEALTH_UNKNOWN = 0;
  WORKER_HEALTH_HEALTHY = 1;
  WORKER_HEALTH_DEGRADED = 2;
  WORKER_HEALTH_UNHEALTHY = 3;
}

// ==== Inter-WC Forwarding Messages ====

// ForwardDispatchRequest wraps a dispatch request with routing metadata for inter-WC forwarding.
message ForwardDispatchRequest {
  // The original dispatch request to forward
  DispatchComponentRequest dispatch_request = 1;

  // The worker ID that should handle this dispatch (connected to this WC)
  string target_worker_id = 2;

  // The coordinator ID that initiated the forward (for anti-loop detection)
  string source_coordinator_id = 3;
}

// Ack for fire-and-forget dispatch forwarding.
message ForwardDispatchAck {
  // Whether the dispatch was accepted and sent to the worker stream.
  bool accepted = 1;
  // The worker ID that received the dispatch (empty if rejected).
  string worker_id = 2;
  // Lease metadata minted when lease-backed push dispatch is enabled.
  string lease_id = 3;
  string lease_worker_id = 4;
  int64 lease_expires_at_ms = 5;
  int64 lease_timeout_ms = 6;
}

// Inter-coordinator cleanup request for active_dispatches.
message ReleaseActiveDispatchRequest {
  // run_id == invocation_id for PUSH dispatches.
  string invocation_id = 1;
  // Terminal journal event type, e.g. run.completed, run.failed, run.cancelled.
  string event_type = 2;
  // Coordinator that observed the terminal event.
  string source_coordinator_id = 3;
}

message ReleaseActiveDispatchAck {
  // True if this coordinator owned and removed the active dispatch entry.
  bool released = 1;
  // Worker whose load was decremented when released is true.
  string worker_id = 2;
}

// =============================================================================
// Legacy Journal Event Messages
// =============================================================================
// These messages are referenced by the legacy ExecutionEngineService in
// execution_engine.proto (WriteJournalEvent / WriteJournalEventsBatch RPCs).
// They remain in this file for backwards compatibility during the migration
// to EngineService.Append on engine.proto; once the SDK fully switches to the
// Append path these messages and the ExecutionEngineService can be deleted.

// WriteJournalEventRequest writes a span or log event to the journal.
// Used by SDK to enable real-time SSE streaming of telemetry data.
message WriteJournalEventRequest {
  // Required: The run ID this event belongs to
  string run_id = 1;

  // Required: Event type - "span" or "log"
  string event_type = 2;

  // Required: JSON-encoded event data (SpanEventData or LogEventData)
  bytes data = 3;

  // Optional: Trace context for correlation
  string trace_id = 4;
  string span_id = 5;

  // Optional: Tenant context (for multi-tenant deployments)
  string project_id = 6;

  // Optional: Source timestamp in nanoseconds since epoch.
  // When provided, this is used instead of server time for correct logical ordering.
  // SDK should set this to the actual time the log/span was generated.
  int64 source_timestamp_ns = 7;

  // Optional: Correlation ID for pairing start/complete events.
  // Generated at operation start, same value for both started and completed events.
  // Example: lm.call.started and lm.call.completed share the same correlation_id.
  string correlation_id = 8;

  // Optional: Parent event ID for building event hierarchy.
  // Links child events to parent (e.g., lm.call.started → parent = agent.iteration.started).
  // Use the correlation_id of the parent event.
  string parent_event_id = 9;

  // Optional: Display-friendly metadata for UI rendering.
  // Key-value pairs like {"model": "gpt-4o-mini", "tokens": "1234", "agent_name": "travel_agent"}.
  map<string, string> metadata = 10;
}

// WriteJournalEventResponse confirms the event was written.
message WriteJournalEventResponse {
  // Assigned sequence number (for resume capability via Last-Event-ID)
  int64 sequence_num = 1;

  // Success indicator
  bool success = 2;

  // Error message if not successful
  string error_message = 3;
}

// WriteJournalEventsBatchRequest writes multiple events atomically.
message WriteJournalEventsBatchRequest {
  repeated WriteJournalEventRequest events = 1;
}

// WriteJournalEventsBatchResponse returns results for batch write.
message WriteJournalEventsBatchResponse {
  // Number of events successfully written
  int32 written_count = 1;

  // Last sequence number assigned
  int64 last_sequence_num = 2;

  // Per-event errors (empty if all succeeded)
  repeated WriteJournalEventError errors = 3;
}

// WriteJournalEventError reports an error for a specific event in a batch.
message WriteJournalEventError {
  int32 index = 1;
  string error_message = 2;
}

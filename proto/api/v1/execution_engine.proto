syntax = "proto3";

package api.v1;

import "google/protobuf/timestamp.proto";
import "api/v1/common.proto";
import "api/v1/engine.proto";
import "api/v1/worker_coordinator.proto";

option go_package = "agnt5.dev/platform/pkg/pb/api/v1;v1";

// ExecutionEngineService is the true orchestrator for AGNT5.
// It owns the journal and all run lifecycle events.
// Gateway routes all requests here; EE dispatches to Worker Coordinator or Serverless.
service ExecutionEngineService {

  // EnqueueComponent enqueues a component for execution and returns immediately.
  // The gateway decides how to wait for the result (NATS, Centrifuge, or polling).
  rpc EnqueueComponent(ExecuteComponentRequest) returns (SubmitComponentResponse);

  // GetRunStatus returns the current status of a run.
  rpc GetRunStatus(GetRunStatusRequest) returns (GetRunStatusResponse);

  // GetRunResult returns the result of a completed run.
  rpc GetRunResult(GetRunResultRequest) returns (GetRunResultResponse);

  // ExecuteSandbox performs synchronous code execution in an isolated sandbox.
  // Flow: Gateway -> EE (writes sandbox.enqueued) -> Sandbox Service (K8s) -> EE (writes sandbox.completed/failed) -> Gateway
  rpc ExecuteSandbox(ExecuteSandboxRequest) returns (ExecuteSandboxResponse);

  // --- Batch Processing APIs ---

  // EnqueueBatch enqueues a batch for execution and returns immediately.
  // The gateway decides how to wait for results (polling, Centrifuge, etc.).
  rpc EnqueueBatch(BatchExecuteRequest) returns (SubmitBatchResponse);

  // GetBatchStatus returns the current status and results of a batch.
  rpc GetBatchStatus(GetBatchStatusRequest) returns (GetBatchStatusResponse);

  // CancelBatch cancels a running batch.
  // Already completed items are preserved; pending items are cancelled.
  rpc CancelBatch(CancelBatchRequest) returns (CancelBatchResponse);

  // --- Signal and Approval RPCs (HITL workflow resume) ---

  // SendSignal delivers a signal to a waiting workflow.
  // The workflow resumes automatically after the signal is received.
  rpc SendSignal(EESendSignalRequest) returns (EESendSignalResponse);

  // ResolveApproval approves or rejects a pending approval request.
  // The workflow resumes automatically after the decision is made.
  rpc ResolveApproval(EEResolveApprovalRequest) returns (EEResolveApprovalResponse);

  // --- Direct Journal RPCs (called by SDK workers) ---

  // WriteJournalEvent persists a boundary event to the journal and publishes to SSE.
  // Called by SDK workers for lifecycle events (workflow.*, agent.*, lm.call.*, tool.call.*).
  // Workers connect to EE via the same gRPC endpoint; Envoy routes by service name.
  rpc WriteJournalEvent(WriteJournalEventRequest) returns (WriteJournalEventResponse);

  // WriteCheckpoint persists a workflow checkpoint (state snapshot) to the journal.
  // Replaces the WorkflowCheckpoint message on WorkerStream — simpler, direct, ack via RPC response.
  // Workers no longer need to wait for CheckpointAck on the dispatch stream.
  rpc WriteCheckpoint(WriteCheckpointRequest) returns (WriteCheckpointResponse);

  // WriteJournalEventsBatch writes multiple boundary events atomically for efficiency.
  rpc WriteJournalEventsBatch(WriteJournalEventsBatchRequest) returns (WriteJournalEventsBatchResponse);

  // EventStream accepts a stream of ephemeral events (tokens, progress, logs)
  // for real-time SSE delivery. No journal persistence. Only used when is_streaming=true.
  rpc EventStream(stream EventStreamMessage) returns (EventStreamAck);
}

// ExecuteComponentRequest is sent by Gateway to initiate component execution.
message ExecuteComponentRequest {
  // Unique identifier for this execution (generated by Gateway)
  string run_id = 1;

  // Component identification
  string service_name = 2;
  ComponentType component_type = 3;
  string component_name = 4;

  // Input data (JSON-encoded)
  bytes input_data = 5;

  // Tenant and deployment context (optional - for multi-tenant deployments)
  optional string project_id = 6;
  optional string deployment_id = 7;

  // Execution metadata
  map<string, string> metadata = 8;

  // Trace context for distributed tracing
  string trace_id = 9;
  string span_id = 10;

  // Timeout in milliseconds (0 = use default)
  int64 timeout_ms = 11;
}

// ExecuteComponentResponse is the result of synchronous execution.
message ExecuteComponentResponse {
  // Run identification
  string run_id = 1;

  // Execution status
  RunStatus status = 2;

  // Output data (JSON-encoded) - present if status is COMPLETED
  bytes output_data = 3;

  // Error message - present if status is FAILED
  string error_message = 4;

  // Trace information
  string trace_id = 5;

  // Execution timing
  google.protobuf.Timestamp started_at = 6;
  google.protobuf.Timestamp completed_at = 7;
}

// ExecuteStreamResponse is a single chunk in a streaming execution.
message ExecuteStreamResponse {
  // Run identification
  string run_id = 1;

  // Type of this stream message
  StreamMessageType message_type = 2;

  // Payload varies by message_type
  oneof payload {
    // For MESSAGE_TYPE_CHUNK: streaming output chunk
    StreamChunk chunk = 3;

    // For MESSAGE_TYPE_LOG: log event
    LogEvent log = 4;

    // For MESSAGE_TYPE_SPAN: span event
    SpanEvent span = 5;

    // For MESSAGE_TYPE_STEP: workflow step update
    StepEvent step = 6;

    // For MESSAGE_TYPE_COMPLETED: final result
    ExecuteComponentResponse result = 7;

    // For MESSAGE_TYPE_ERROR: execution error
    ErrorEvent error = 8;
  }
}

// SubmitComponentResponse is returned immediately for async execution.
message SubmitComponentResponse {
  // Run identification - use this to poll for status/result
  string run_id = 1;

  // Trace information
  string trace_id = 2;

  // Status URL for polling (optional, for REST clients)
  string status_url = 3;
}

// GetRunStatusRequest queries the status of a run.
message GetRunStatusRequest {
  string run_id = 1;
  optional string project_id = 2;
}

// GetRunStatusResponse returns the current run status.
message GetRunStatusResponse {
  string run_id = 1;
  RunStatus status = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp started_at = 4;
  optional google.protobuf.Timestamp completed_at = 5;
  string trace_id = 6;
}

// GetRunResultRequest queries the result of a completed run.
message GetRunResultRequest {
  string run_id = 1;
  optional string project_id = 2;
}

// GetRunResultResponse returns the run result.
message GetRunResultResponse {
  string run_id = 1;
  RunStatus status = 2;
  bytes output_data = 3;
  string error_message = 4;
  string trace_id = 5;
  google.protobuf.Timestamp completed_at = 6;
}

// RunStatus represents the lifecycle state of a run.
enum RunStatus {
  RUN_STATUS_UNSPECIFIED = 0;
  RUN_STATUS_ENQUEUED = 1;    // Written to journal, waiting to start
  RUN_STATUS_STARTED = 2;     // Dispatched to worker/serverless
  RUN_STATUS_RUNNING = 3;     // Actively executing
  RUN_STATUS_COMPLETED = 4;   // Successfully completed
  RUN_STATUS_FAILED = 5;      // Execution failed
  RUN_STATUS_CANCELLED = 6;   // Cancelled by user/timeout
  RUN_STATUS_PAUSED = 7;      // Waiting for signal/approval/timer
}

// StreamMessageType identifies the type of streaming message.
enum StreamMessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_CHUNK = 1;      // Output chunk (e.g., LLM token)
  MESSAGE_TYPE_LOG = 2;        // Log event
  MESSAGE_TYPE_SPAN = 3;       // Tracing span
  MESSAGE_TYPE_STEP = 4;       // Workflow step update
  MESSAGE_TYPE_COMPLETED = 5;  // Execution completed
  MESSAGE_TYPE_ERROR = 6;      // Execution error
  MESSAGE_TYPE_ENQUEUED = 7;   // Confirms run.enqueued written to journal
  MESSAGE_TYPE_STARTED = 8;    // Confirms run.started written to journal
}

// StreamChunk represents a streaming output chunk.
message StreamChunk {
  bytes data = 1;
  string content_type = 2;  // e.g., "text/plain", "application/json"
  int64 sequence = 3;       // Chunk sequence number
}

// LogEvent represents a log entry during execution.
message LogEvent {
  string level = 1;         // debug, info, warn, error
  string message = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> attributes = 4;
}

// SpanEvent represents a tracing span during execution.
message SpanEvent {
  string span_id = 1;
  string parent_span_id = 2;
  string name = 3;
  google.protobuf.Timestamp start_time = 4;
  optional google.protobuf.Timestamp end_time = 5;
  map<string, string> attributes = 6;
}

// StepEvent represents a workflow step lifecycle event.
message StepEvent {
  string step_id = 1;
  string step_name = 2;
  StepStatus status = 3;
  optional bytes output_data = 4;
  optional string error_message = 5;
  google.protobuf.Timestamp timestamp = 6;
}

// StepStatus represents workflow step states.
enum StepStatus {
  STEP_STATUS_UNSPECIFIED = 0;
  STEP_STATUS_STARTED = 1;
  STEP_STATUS_COMPLETED = 2;
  STEP_STATUS_FAILED = 3;
  STEP_STATUS_SKIPPED = 4;  // Memoized/skipped
}

// ErrorEvent represents an execution error.
message ErrorEvent {
  string code = 1;
  string message = 2;
  map<string, string> details = 3;
  bool retryable = 4;
}

// ExecuteSandboxRequest is sent by Gateway to execute code in an isolated sandbox.
message ExecuteSandboxRequest {
  // Unique identifier for this execution (generated by Gateway)
  string run_id = 1;

  // Language runtime to use
  SandboxLanguage language = 2;

  // Code to execute
  string code = 3;

  // Tenant and deployment context (optional - for multi-tenant deployments)
  optional string project_id = 4;
  optional string deployment_id = 5;

  // Execution metadata
  map<string, string> metadata = 6;

  // Trace context for distributed tracing
  string trace_id = 7;
  string span_id = 8;

  // Timeout in milliseconds (0 = use default)
  int64 timeout_ms = 9;

  // Resource limits for execution
  optional SandboxResourceLimits resource_limits = 10;
}

// ExecuteSandboxResponse is the result of sandbox execution.
message ExecuteSandboxResponse {
  // Run identification
  string run_id = 1;

  // Execution status
  RunStatus status = 2;

  // Exit code from the process
  int32 exit_code = 3;

  // Standard output (base64 encoded)
  bytes stdout = 4;

  // Standard error (base64 encoded)
  bytes stderr = 5;

  // Error message - present if status is FAILED
  string error_message = 6;

  // Trace information
  string trace_id = 7;

  // Execution timing
  google.protobuf.Timestamp started_at = 8;
  google.protobuf.Timestamp completed_at = 9;

  // Resource usage metrics
  optional SandboxResourceUsage resource_usage = 10;
}

// SandboxResourceLimits defines resource constraints for sandbox execution.
message SandboxResourceLimits {
  // CPU limit in millicores (default: 100, max: 1000)
  optional int32 cpu_millicores = 1;

  // Memory limit in MiB (default: 128, max: 512)
  optional int32 memory_mib = 2;

  // Timeout in seconds (default: 60, max: 300)
  optional int32 timeout_seconds = 3;

  // Allow network access (default: false)
  optional bool allow_network = 4;
}

// SandboxResourceUsage reports actual resource consumption.
message SandboxResourceUsage {
  // Peak memory usage in bytes
  int64 peak_memory_bytes = 1;

  // CPU time in milliseconds
  int64 cpu_time_ms = 2;

  // Wall clock time in milliseconds
  int64 wall_time_ms = 3;
}

// SandboxLanguage specifies the runtime environment.
enum SandboxLanguage {
  SANDBOX_LANGUAGE_UNSPECIFIED = 0;
  SANDBOX_LANGUAGE_PYTHON = 1;
  SANDBOX_LANGUAGE_NODE = 2;
  SANDBOX_LANGUAGE_GO = 3;
  SANDBOX_LANGUAGE_RUST = 4;
  SANDBOX_LANGUAGE_BASH = 5;
}

// =============================================================================
// Batch Processing Messages
// =============================================================================

// BatchExecuteRequest initiates batch execution of a component.
message BatchExecuteRequest {
  // Unique batch identifier (auto-generated if empty)
  string batch_id = 1;

  // Items to execute (same component, different inputs)
  repeated BatchItem items = 2;

  // Batch configuration
  BatchConfig config = 3;

  // Component identification - same for all items
  string service_name = 4;
  ComponentType component_type = 5;
  string component_name = 6;

  // Tenant and deployment context (optional - for multi-tenant deployments)
  optional string project_id = 7;
  optional string deployment_id = 8;

  // Trace context for distributed tracing
  string trace_id = 9;

  // Execution metadata applied to all items
  map<string, string> metadata = 10;
}

// BatchItem represents a single item in a batch.
message BatchItem {
  // Item position in batch (0-indexed, for result ordering)
  int32 index = 1;

  // Optional user-provided item identifier
  string item_id = 2;

  // Input data for this item (JSON-encoded)
  bytes input_data = 3;

  // Per-item metadata (merged with batch metadata)
  map<string, string> metadata = 4;

  // Per-item timeout override in milliseconds (0 = use batch default)
  int64 timeout_ms = 5;
}

// BatchConfig configures batch execution behavior.
message BatchConfig {
  // Maximum concurrent item executions (default: 10)
  int32 max_concurrency = 1;

  // Continue processing remaining items on failure (default: true)
  bool continue_on_failure = 2;

  // Overall batch timeout in milliseconds (default: 3600000 = 1 hour)
  int64 batch_timeout_ms = 3;

  // Default per-item timeout in milliseconds (default: 30000 = 30 seconds)
  int64 default_item_timeout_ms = 4;
}

// BatchExecuteResponse is the result of batch execution.
message BatchExecuteResponse {
  // Batch identification
  string batch_id = 1;

  // Overall batch status
  BatchStatus status = 2;

  // Results for all items (ordered by index)
  repeated BatchItemResult results = 3;

  // Batch statistics
  BatchStats stats = 4;

  // Trace information
  string trace_id = 5;
}

// BatchItemResult is the result of a single item in the batch.
message BatchItemResult {
  // Item position in batch
  int32 index = 1;

  // User-provided item identifier (if supplied)
  string item_id = 2;

  // Run ID for this item's execution
  string run_id = 3;

  // Item execution status
  RunStatus status = 4;

  // Output data (JSON-encoded) - present if status is COMPLETED
  bytes output_data = 5;

  // Error message - present if status is FAILED
  string error_message = 6;

  // Error code - present if status is FAILED
  string error_code = 7;

  // Execution duration in milliseconds
  int64 duration_ms = 8;

  // Execution timing
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp completed_at = 10;
}

// BatchStats provides aggregate statistics for a batch.
message BatchStats {
  // Total number of items in batch
  int32 total_items = 1;

  // Number of items completed successfully
  int32 completed_items = 2;

  // Number of items that failed
  int32 failed_items = 3;

  // Number of items cancelled (due to batch cancellation or timeout)
  int32 cancelled_items = 4;

  // Number of items still pending
  int32 pending_items = 5;

  // Total batch duration in milliseconds
  int64 duration_ms = 6;

  // Average item duration in milliseconds
  int64 avg_item_duration_ms = 7;
}

// BatchProgressEvent is a streaming update during batch execution.
message BatchProgressEvent {
  // Batch identification
  string batch_id = 1;

  // Type of progress event
  BatchProgressType event_type = 2;

  // Event payload varies by type
  oneof payload {
    // For BATCH_PROGRESS_STARTED: batch has started
    BatchStartedEvent batch_started = 3;

    // For BATCH_PROGRESS_ITEM_STARTED: item execution started
    BatchItemStartedEvent item_started = 4;

    // For BATCH_PROGRESS_ITEM_COMPLETED: item execution completed
    BatchItemResult item_completed = 5;

    // For BATCH_PROGRESS_COMPLETED: batch has completed
    BatchExecuteResponse batch_completed = 6;
  }
}

// BatchProgressType identifies the type of batch progress event.
enum BatchProgressType {
  BATCH_PROGRESS_UNSPECIFIED = 0;
  BATCH_PROGRESS_STARTED = 1;       // Batch execution started
  BATCH_PROGRESS_ITEM_STARTED = 2;  // Item execution started
  BATCH_PROGRESS_ITEM_COMPLETED = 3; // Item execution completed (success or failure)
  BATCH_PROGRESS_COMPLETED = 4;      // Batch execution completed
  BATCH_PROGRESS_CANCELLED = 5;      // Batch was cancelled
}

// BatchStartedEvent is emitted when a batch begins execution.
message BatchStartedEvent {
  // Batch identification
  string batch_id = 1;

  // Total number of items to process
  int32 total_items = 2;

  // Configured concurrency
  int32 max_concurrency = 3;

  // Trace information
  string trace_id = 4;

  // Start timestamp
  google.protobuf.Timestamp started_at = 5;
}

// BatchItemStartedEvent is emitted when an item begins execution.
message BatchItemStartedEvent {
  // Item position in batch
  int32 index = 1;

  // User-provided item identifier
  string item_id = 2;

  // Run ID for this item's execution
  string run_id = 3;

  // Start timestamp
  google.protobuf.Timestamp started_at = 4;
}

// BatchStatus represents the lifecycle state of a batch.
enum BatchStatus {
  BATCH_STATUS_UNSPECIFIED = 0;
  BATCH_STATUS_PENDING = 1;          // Batch created, not yet started
  BATCH_STATUS_QUEUED = 2;           // Batch queued due to rate limiting
  BATCH_STATUS_RUNNING = 3;          // Batch is actively executing items
  BATCH_STATUS_COMPLETED = 4;        // All items completed successfully
  BATCH_STATUS_PARTIAL_FAILURE = 5;  // Some items failed, some succeeded
  BATCH_STATUS_FAILED = 6;           // All items failed or batch-level failure
  BATCH_STATUS_CANCELLED = 7;        // Batch was cancelled
}

// SubmitBatchResponse is returned immediately for async batch execution.
message SubmitBatchResponse {
  // Batch identification - use this to poll for status/results
  string batch_id = 1;

  // Batch status (typically PENDING or QUEUED)
  BatchStatus status = 2;

  // Total number of items
  int32 total_items = 3;

  // Trace information
  string trace_id = 4;

  // Status URL for polling (optional, for REST clients)
  string status_url = 5;
}

// GetBatchStatusRequest queries the status and results of a batch.
message GetBatchStatusRequest {
  // Batch identification
  string batch_id = 1;

  // Tenant context (optional)
  optional string project_id = 2;

  // Include item results in response (default: true)
  optional bool include_results = 3;
}

// GetBatchStatusResponse returns the current batch status and results.
message GetBatchStatusResponse {
  // Batch identification
  string batch_id = 1;

  // Overall batch status
  BatchStatus status = 2;

  // Results for all items (if include_results was true)
  repeated BatchItemResult results = 3;

  // Batch statistics
  BatchStats stats = 4;

  // Trace information
  string trace_id = 5;

  // Timing information
  google.protobuf.Timestamp submitted_at = 6;
  optional google.protobuf.Timestamp started_at = 7;
  optional google.protobuf.Timestamp completed_at = 8;
}

// CancelBatchRequest cancels a running or pending batch.
message CancelBatchRequest {
  // Batch identification
  string batch_id = 1;

  // Tenant context (optional)
  optional string project_id = 2;

  // Reason for cancellation (optional, logged for audit)
  optional string reason = 3;
}

// CancelBatchResponse confirms batch cancellation.
message CancelBatchResponse {
  // Batch identification
  string batch_id = 1;

  // Status after cancellation (CANCELLED or COMPLETED if already finished)
  BatchStatus status = 2;

  // Number of items that were cancelled
  int32 cancelled_items = 3;

  // Number of items that were already completed
  int32 completed_items = 4;
}

// =============================================================================
// Direct Journal RPC Messages (called by SDK workers)
// =============================================================================

// Note: WriteJournalEventRequest, WriteJournalEventResponse, WriteJournalEventsBatchRequest,
// WriteJournalEventsBatchResponse, and WriteJournalEventError are defined in
// worker_coordinator.proto and shared within the api.v1 package.

// WriteCheckpointRequest persists a workflow checkpoint to the journal.
// This is the direct replacement for WorkflowCheckpoint on WorkerStream.
// The RPC response serves as the acknowledgment (replaces CheckpointAck).
message WriteCheckpointRequest {
  string run_id = 1;               // Run this checkpoint belongs to
  string checkpoint_type = 2;      // Event type (e.g., "workflow.step.completed")
  bytes checkpoint_data = 3;       // JSON state snapshot / event payload
  int64 sequence_number = 4;       // Local sequence number for ordering within execution
  string trace_id = 5;             // Trace context
  string project_id = 6;            // Tenant context (for multi-tenant deployments)
  int64 source_timestamp_ns = 7;   // Nanosecond timestamp when event was created at source
  string correlation_id = 8;       // Correlation ID for event pairing
  string parent_event_id = 9;      // Parent event ID for hierarchy
  map<string, string> metadata = 10; // Additional metadata
}

// WriteCheckpointResponse confirms the checkpoint was persisted.
// Serves as the acknowledgment — workers no longer need CheckpointAck on the stream.
message WriteCheckpointResponse {
  bool success = 1;                 // Whether the checkpoint was persisted
  int64 sequence_number = 2;        // Assigned journal sequence number
  string error_message = 3;         // Error message if not successful
}

// =============================================================================
// Signal and Approval Messages (HITL workflow resume via EE)
// =============================================================================

// EESendSignalRequest delivers a signal to a waiting workflow step via Execution Engine.
// Unlike the WC SendSignalRequest, this triggers automatic workflow resume.
message EESendSignalRequest {
  string run_id = 1;                // Run waiting for the signal
  string signal_name = 2;           // Signal name to match
  bytes payload = 3;                // Signal payload (JSON-encoded)
  optional string project_id = 4;    // Tenant context (multi-tenant deployments)
  string waiting_step = 5;          // Waiting step name (empty matches any)
}

// EESendSignalResponse reports the result of sending a signal via Execution Engine.
message EESendSignalResponse {
  bool found = 1;                   // Whether a matching signal was found
  string signal_id = 2;             // Signal record ID
  string status = 3;                // "received", "already_received", "not_found"
  string run_id = 4;                // Run ID for confirmation
}

// EEResolveApprovalRequest approves or rejects a pending approval via Execution Engine.
// Unlike the WC ResolveApprovalRequest, this triggers automatic workflow resume.
message EEResolveApprovalRequest {
  string approval_id = 1;           // Approval record ID
  string decision = 2;              // "approved" or "rejected"
  string decided_by = 3;            // Who made the decision
  string reason = 4;                // Reason for decision
  bytes decision_payload = 5;       // Additional payload (JSON-encoded)
  optional string project_id = 6;    // Tenant context (multi-tenant deployments)
}

// EEResolveApprovalResponse reports the result of resolving an approval via Execution Engine.
message EEResolveApprovalResponse {
  bool success = 1;                 // Whether the operation succeeded
  string status = 2;                // "approved", "rejected", "already_resolved", "not_found"
  string run_id = 3;                // Run ID for confirmation
}
